<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AM E-sports team - 共に人間性、フォートナイトの技術、楽しさを高め合える仲間が集まるクラン">
    <title>AM E-sports team | Official Website</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Montserrat:wght@400;700;900&display=swap"
        rel="stylesheet">

    <!-- FontAwesome for SNS Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-grid"></div>
    <div class="noise-overlay"></div>

    <main>
        <!-- Hero Section -->
        <section id="hero" class="hero fullscreen fade-in">
            <div class="hero-content">
                <div class="logo-container">
                    <img src="logo.png" alt="AM E-sports team Logo" class="main-logo" id="logo">
                </div>
                <h1 class="glitch-text" data-text="AM E-SPORTS TEAM">AM E-SPORTS TEAM</h1>
                <p class="subtitle">FORTNITE COMPETITIVE CLAN</p>
            </div>
            <div class="scroll-indicator">
                <i class="fa-solid fa-chevron-down"></i>
            </div>
        </section>

        <!-- Mission Section -->
        <section id="mission" class="mission section-padding fade-in">
            <div class="container">
                <h2 class="section-title">OUR MISSION</h2>
                <div class="mission-box neon-border">
                    <i class="fa-solid fa-quote-left quote-icon"></i>
                    <p class="mission-text">
                        共に人間性、フォートナイトの技術、フォートナイトの楽しさを高め合える仲間で集まれるクランに！<br>
                        このクランの目標は礼儀正しくて人間性が高くて強い選手を育成すること！
                    </p>
                    <i class="fa-solid fa-quote-right quote-icon right"></i>
                </div>
            </div>
        </section>

        <!-- Roster Section -->
        <section id="roster" class="roster section-padding fade-in">
            <div class="container">
                <h2 class="section-title">ROSTER</h2>
                <div class="roster-grid" id="roster-grid">
                    <!-- JavaScript will insert player cards here -->
                </div>
            </div>
        </section>

        <!-- Contact / SNS Section -->
        <section id="contact" class="contact section-padding fade-in">
            <div class="container">
                <h2 class="section-title">CONNECT WITH US</h2>
                <div class="social-links">
                    <a href="https://x.com/AM_Esports_fn" target="_blank" class="social-btn neon-box"
                        aria-label="Official X (Twitter)">
                        <i class="fa-brands fa-x-twitter"></i>
                        <span>Official Account</span>
                    </a>
                </div>

                <h3 class="owner-title">OWNER / FOUNDER</h3>
                <div class="social-links owner-links">
                    <a href="https://www.youtube.com/@am-rousi/streams" target="_blank" class="social-icon-btn"
                        aria-label="Owner YouTube">
                        <i class="fa-brands fa-youtube"></i>
                    </a>
                    <a href="https://x.com/amloushi" target="_blank" class="social-icon-btn" aria-label="Owner X">
                        <i class="fa-brands fa-x-twitter"></i>
                    </a>
                    <a href="https://www.tiktok.com/@amroushi01" target="_blank" class="social-icon-btn tiktok"
                        aria-label="Owner TikTok">
                        <i class="fa-brands fa-tiktok"></i>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 AM E-sports team. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
